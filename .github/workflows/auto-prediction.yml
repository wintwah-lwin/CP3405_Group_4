name: Auto Prediction

on:
  schedule:
    - cron: '0 20 * * 6'   # Sunday 4 AM SGT
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}/scripts

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Compute project week
        id: week
        run: |
          START_DATE="2026-05-25"
          CURRENT_DATE=$(TZ='Asia/Singapore' date +%F)
          START_SECS=$(date -d "$START_DATE" +%s)
          CURRENT_SECS=$(date -d "$CURRENT_DATE" +%s)
          DAYS_PASSED=$(( (CURRENT_SECS - START_SECS) / 86400 ))
          PROJECT_WEEK=$(( (DAYS_PASSED / 7) + 1 ))
          echo "week=$PROJECT_WEEK" >> "$GITHUB_OUTPUT"
          echo "Running for Project Week: $PROJECT_WEEK"

      - name: 1. Automated Fetch (R6)
        run: |
          python scripts/run_weekly_fetch.py \
            --week ${{ steps.week.outputs.week }} \
            --repo "${{ github.workspace }}" \
            --no-push

      - name: 2. Run Agents (R3, R4, R5)
        run: |
          python scripts/run_almanac_agent.py --week ${{ steps.week.outputs.week }}
          python scripts/run_macro_agent.py --week ${{ steps.week.outputs.week }} --repo "${{ github.workspace }}" --no-push
          python scripts/run_technical_agent.py --week ${{ steps.week.outputs.week }}

      - name: 3. LLM API Synthesis (R8)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/run_llm_integration.py --week ${{ steps.week.outputs.week }}

      - name: 4. Generate Final Prediction
        run: |
          python scripts/run_final_prediction.py --week ${{ steps.week.outputs.week }}

      - name: 5. Auto-Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add evidence/ incoming/
          git diff --staged --quiet || git commit -m "Auto-commit: Sprint 6 Pipeline execution (Week ${{ steps.week.outputs.week }})"
          git push

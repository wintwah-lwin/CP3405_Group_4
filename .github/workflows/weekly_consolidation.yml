name: Weekly Team File Consolidation

on:
  schedule:
    # Runs every Sunday at 15:00 UTC (11:00 PM Singapore Standard Time / SGT)
    - cron: '0 15 * * 0'
  workflow_dispatch: 
    # Allows you to manually trigger this anytime from the GitHub UI for testing

jobs:
  organize-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. Pull the latest repository state
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Consolidate markdown, image, and text files from incoming/ into the evidence/Week 5 directory
      - name: Move Files to Week Folder
        run: |
          TARGET_DIR="evidence/Week 5"
          mkdir -p "$TARGET_DIR"

          # Enable nullglob so empty matches expand to nothing instead of literal strings
          shopt -s nullglob
          
          # Collect all target extensions (including case-insensitive variations for safety)
          FILES=(incoming/*.md incoming/*.png incoming/*.jpg incoming/*.jpeg incoming/*.txt incoming/*.PNG incoming/*.JPG incoming/*.TXT)

          # Check if any files matching these extensions exist
          if [ -d "incoming" ] && [ ${#FILES[@]} -gt 0 ]; then
            echo "Found team files in incoming/. Consolidating ${#FILES[@]} file(s) to $TARGET_DIR..."
            mv "${FILES[@]}" "$TARGET_DIR/"
          else
            echo "No new markdown, image, or text files found in incoming/ staging area."
          fi

      # 3. Commit changes to generate the automated fetch log
      - name: Auto-Commit and Log
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add "evidence/Week 5/"
          git add incoming/ 

          if git diff-index --quiet HEAD --; then
            echo "No new files to consolidate."
          else
            # Creates an automated timestamp tracking log in Singapore Time
            TIMESTAMP=$(date -u -d "+8 hours" +"%Y-%m-%d %H:%M:%S SGT")
            git commit -m "chore(pipeline): automated weekly file fetch & consolidation ($TIMESTAMP)"
            git push origin main
          fi

name: Weekly Team File Consolidation

on:
  schedule:
    # Runs every Sunday at 13:00 UTC (9:00 PM Singapore Standard Time / SGT)
    - cron: '0 13 * * 0'
  workflow_dispatch: 
    # Allows you to manually trigger this anytime from the GitHub UI for testing

jobs:
  organize-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. Pull the latest repository state
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Consolidate markdown files from incoming/ into the evidence/Week 5 directory
      - name: Move Files to Week Folder
        run: |
          TARGET_DIR="evidence/Week 5"
          mkdir -p "$TOP_DIR" || mkdir -p "$TARGET_DIR"

          # Check if there are any .md files in the staging folder
          if [ -d "incoming" ] && [ "$(ls -A incoming/*.md 2>/dev/null)" ]; then
            echo "Found team markdown files in incoming/. Consolidating to $TARGET_DIR..."
            mv incoming/*.md "$TARGET_DIR/"
          else
            echo "No new markdown files found in incoming/ staging area."
          fi

      # 3. Commit changes to generate the automated fetch log
      - name: Auto-Commit and Log
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add "evidence/Week 5/"
          git add incoming/ 

          if git diff-index --quiet HEAD --; then
            echo "No new files to consolidate."
          else
            # Creates an automated timestamp tracking log in Singapore Time
            TIMESTAMP=$(date -u -d "+8 hours" +"%Y-%m-%d %H:%M:%S SGT")
            git commit -m "chore(pipeline): automated weekly file fetch & consolidation ($TIMESTAMP)"
            git push origin main
          fi
